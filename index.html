<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Production</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-top: #f6f6f6;
      --bg-bottom: #dddddd;
      --text: #111111;
      --soft: rgba(0, 0, 0, 0.08);
      --soft-2: rgba(0, 0, 0, 0.14);
      --card: rgba(255, 255, 255, 0.56);
      --line: rgba(0, 0, 0, 0.12);
    }

    html,
    body {
      min-height: 100vh;
      font-family: "Comic Sans MS", "Trebuchet MS", cursive, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.88), transparent 35%),
        linear-gradient(to bottom, var(--bg-top), var(--bg-bottom));
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(0,0,0,0.035) 1px, transparent 1px);
      background-size: 11px 11px;
      opacity: 0.45;
      mix-blend-mode: multiply;
    }

    .viewport {
      min-height: 100vh;
      position: relative;
    }

    .camera {
      min-height: 200vh;
      display: flex;
      flex-direction: column;
      transition: transform 2s cubic-bezier(0.4, 1, 0.6, 1);
      will-change: transform;
    }

    body.show-products .camera {
      transform: translateY(-100vh);
    }

    .page {
      min-height: 100vh;
      position: relative;
      padding: 44px 44px 72px;
    }

    .landing-page {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .logo {
      font-size: clamp(44px, 6vw, 86px);
      font-weight: 400;
      line-height: 1;
      margin-bottom: 118px;
      position: relative;
      z-index: 2;
    }

    .hero-link {
      display: inline-block;
      width: fit-content;
      font-size: clamp(30px, 3.5vw, 62px);
      color: var(--text);
      text-decoration: none;
      margin-left: 34px;
      position: relative;
      z-index: 2;
      transition: transform 0.2s ease, letter-spacing 0.2s ease, opacity 0.35s ease;
    }

    .hero-link:hover {
      transform: translateX(8px);
      letter-spacing: 1px;
    }

    .hero-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -8px;
      width: 0;
      height: 3px;
      background: rgba(0,0,0,0.45);
      transition: width 0.24s ease;
    }

    .hero-link:hover::after {
      width: 100%;
    }

    .hint {
      margin-top: 16px;
      margin-left: 38px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      opacity: 0.55;
      position: relative;
      z-index: 2;
      transition: opacity 0.35s ease;
    }


    body.show-products .hero-link,
    body.show-products .hint,
    body.show-products .cursor-doodle {
      opacity: 0;
      pointer-events: none;
    }

    .products-page {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      padding-top: 110px;
      padding-bottom: 120px;
    }

    .bg-logo {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0.09;
      filter: grayscale(1) blur(1px);
      z-index: 0;
    }

    .bg-logo img {
      width: min(72vw, 980px);
      max-width: 980px;
      transform: rotate(-6deg);
      display: block;
    }

    .products {
      width: min(1280px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 26px;
      position: relative;
      z-index: 2;
      opacity: 0;
      transform: translateY(70px) scale(0.98);
      transition: opacity 0.7s ease 0.32s, transform 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.22s;
      pointer-events: none;
    }

    .products.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .card {
      display: block;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.42);
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 16px 30px var(--soft);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card:hover {
      transform: translateY(-8px) rotate(-1deg);
      box-shadow: 0 20px 40px var(--soft-2);
    }

    .cover {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 14px;
      background: linear-gradient(145deg, #d8d8d8, #f6f6f6);
      border: 2px dashed var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover.placeholder {
      font-size: 30px;
      color: rgba(0, 0, 0, 0.55);
    }

    .card h3 {
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .card p {
      font-family: Arial, sans-serif;
      font-size: 15px;
      line-height: 1.42;
      opacity: 0.78;
    }

    @media (max-width: 900px) {
      .products {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 700px) {
      .page {
        padding: 28px 20px 56px;
      }

      .logo {
        margin-bottom: 70px;
      }

      .hero-link,
      .hint {
        margin-left: 0;
      }

      .products {
        grid-template-columns: 1fr;
      }

      .bg-logo img {
        width: min(120vw, 700px);
      }
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="camera">
      <main class="page landing-page">
        <div class="corner-shape"></div>
        <div class="cursor-doodle"></div>

        <h1 class="logo">Family Production™</h1>

        <a href="#games" class="hero-link" id="openProducts">&gt;&gt; Click to view products &lt;&lt;</a>
        <p class="hint"></p>
      </main>

      <section class="page products-page" id="games">
        <div class="bg-logo">
          <img src="images/ alt="Family Production logo background">
        </div>

        <div class="products" id="productsGrid">
          <a class="card" href="https://itch.io" target="_blank" rel="noopener noreferrer">
            <div class="cover">
              <img src="images/logo.png" alt="Family Budget">
            </div>
            <h3>Family Budget</h3>
            <p></p>
          </a>

          <a class="card" href="https://gamejolt.com" target="_blank" rel="noopener noreferrer">
            <div class="cover placeholder"></div>
            <h3>Soon...</h3>
            <p>.</p>
          </a>

          <a class="card" href="https://example.com" target="_blank" rel="noopener noreferrer">
            <div class="cover placeholder"></div>
            <h3>Soon...</h3>
            <p></p>
          </a>
        </div>
      </section>
    </div>
  </div>

  <script>
    const openBtn = document.getElementById('openProducts');
    const productsGrid = document.getElementById('productsGrid');
    const gamesSection = document.getElementById('games');

    openBtn.addEventListener('click', function (event) {
      event.preventDefault();

      if (document.body.classList.contains('show-products')) {
        return;
      }

      document.body.classList.add('show-products');

      setTimeout(() => {
        productsGrid.classList.add('active');
      }, 420);

      setTimeout(() => {
        gamesSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 650);
    });
  </script>
</body>
</html>
